<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your Doodle Desk account password to access premium notebooks, art supplies, and writing tools.">
  <title>Forgot Password | Doodle Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="../assets/css/dark-mode.css" rel="stylesheet">
  <link href="../assets/css/rtl.css" rel="stylesheet">
  <link href="../assets/css/doodle-desk.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <link rel="apple-touch-icon" href="../assets/images/favicon.png">
</head>
<body class="auth-page-standalone">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ========== NAVBAR ========== -->
  <!-- ========== MAIN CONTENT ========== -->
  <main id="main-content">
    <section class="section-padding reveal-on-scroll">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card card-stationery p-4 shadow-sm border-0 rounded-4">
              <div class="text-center mb-4">
                <a href="index.html" class="auth-logo-link d-inline-flex align-items-center justify-content-center gap-2 mb-3 text-decoration-none">
                  <span class="brand-mark" aria-hidden="true">DD</span>
                  <span class="brand-text">Doodle <span class="brand-accent">Desk</span></span>
                </a>
                <h2 class="h4 fw-bold mb-1">Reset Password</h2>
                <p class="text-muted small">Enter your email and we'll send a password recovery link.</p>
              </div>

              <!-- Alert messages -->
              <div id="forgotAlert" class="mb-3" style="display:none;"></div>

              <form id="forgotForm" class="form-stationery needs-validation" novalidate>
                <div class="mb-4">
                  <label for="forgotEmail" class="form-label">Email Address</label>
                  <input type="email" class="form-control" id="forgotEmail" required placeholder="name@example.com">
                  <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 rounded-3 mb-3"><i class="fas fa-paper-plane me-2"></i>Send Reset Link</button>
                
                <div class="text-center mt-3">
                  <p class="small text-muted mb-0">Back to <a href="user-login.html" class="text-decoration-none text-primary-custom fw-bold">Sign In</a></p>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <div class="modal fade search-modal" id="searchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body">
          <form role="search" action="products.html">
            <input type="search" class="form-control" placeholder="Search…" aria-label="Search">
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/navbar.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Setup validations
      window.DoodleValidation.setupRealTimeValidation('#forgotForm', {
        forgotEmail: { required: true, email: true }
      });

      const form = document.getElementById('forgotForm');
      const alertBox = document.getElementById('forgotAlert');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!form.checkValidity()) return;

        const email = document.getElementById('forgotEmail').value;
        const res = window.DoodleAuth.resetPassword(email);

        if (res.success) {
          alertBox.className = 'alert alert-success';
          alertBox.style.display = 'block';
          alertBox.innerHTML = `<i class="fas fa-check-circle me-2"></i>${res.message}`;
          form.reset();
          form.classList.remove('was-validated');
        } else {
          alertBox.className = 'alert alert-danger';
          alertBox.style.display = 'block';
          alertBox.innerHTML = `<i class="fas fa-times-circle me-2"></i>${res.message}`;
        }
      });
    });
  </script>
</body>
</html>
