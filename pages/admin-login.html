<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Access Doodle Desk's professional admin panel to manage products, users, sales metrics, and customer invoices.">
  <title>Admin Login | Doodle Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&family=Source+Sans+Pro:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="../assets/css/dark-mode.css" rel="stylesheet">
  <link href="../assets/css/rtl.css" rel="stylesheet">
  <link href="../assets/css/doodle-desk.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <link rel="apple-touch-icon" href="../assets/images/favicon.png">
</head>

<body class="auth-page-standalone">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ========== NAVBAR ========== -->
  <!-- ========== MAIN CONTENT ========== -->
  <main id="main-content">
    <section class="section-padding">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card card-stationery p-4 shadow-sm border-0 rounded-4">
              <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand d-inline-flex align-items-center gap-2 mx-auto mb-3">

                  <span class="brand-mark" aria-hidden="true">DD</span>

                  <span class="brand-text">
                    Doodle <span class="brand-accent">Desk</span>
                  </span>

                </a>
                <h2 class="h4 fw-bold mb-1">Admin Sign In</h2>
                <p class="text-muted small">Manage items, view users, and check orders.</p>
              </div>

              <!-- Alert messages -->
              <div id="adminAlert" class="mb-3" style="display:none;"></div>

              <form id="adminLoginForm" class="form-stationery needs-validation" novalidate>
                <div class="mb-3">
                  <label for="adminEmail" class="form-label">Admin Email</label>
                  <input type="email" class="form-control" id="adminEmail" required placeholder="admin@doodledesk.com">
                  <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-4">
                  <label for="adminPassword" class="form-label">Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control" id="adminPassword" required
                      placeholder="Enter password">
                    <button class="btn btn-outline-secondary" type="button" id="toggleAdminPasswordBtn"
                      aria-label="Toggle password visibility">
                      <i class="far fa-eye" aria-hidden="true"></i>
                    </button>
                    <div class="invalid-feedback">Password is required.</div>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 rounded-3 mb-3"><i
                    class="fas fa-lock me-2"></i>Sign In As Admin</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <!-- Dynamic Search Modal -->
  <div class="modal fade search-modal" id="searchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body">
          <form role="search" action="products.html">
            <input type="search" class="form-control" placeholder="Search..." aria-label="Search">
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/navbar.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (window.DoodleAdmin.getCurrentAdmin()) {
        window.location.href = 'admin-dashboard.html';
      }

      // Setup validations
      window.DoodleValidation.setupRealTimeValidation('#adminLoginForm', {
        adminEmail: { required: true, email: true },
        adminPassword: { required: true }
      });

      // Show/Hide password toggle
      const toggleBtn = document.getElementById('toggleAdminPasswordBtn');
      const passInput = document.getElementById('adminPassword');
      if (toggleBtn && passInput) {
        toggleBtn.addEventListener('click', () => {
          input_toggle();
        });
        function input_toggle() {
          const type = passInput.type === 'password' ? 'text' : 'password';
          passInput.type = type;
          toggleBtn.querySelector('i').classList.toggle('fa-eye');
          toggleBtn.querySelector('i').classList.toggle('fa-eye-slash');
        }
      }

      // Submit Form
      const form = document.getElementById('adminLoginForm');
      const alertBox = document.getElementById('adminAlert');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!form.checkValidity()) return;

        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPassword').value;

        const res = window.DoodleAdmin.login(email, pass);

        if (res.success) {
          alertBox.className = 'alert alert-success';
          alertBox.style.display = 'block';
          alertBox.innerHTML = `<i class="fas fa-check-circle me-2"></i>${res.message}`;
          setTimeout(() => {
            window.location.href = "admin-dashboard.html";
          }, 1000);
        } else {
          alertBox.className = 'alert alert-danger';
          alertBox.style.display = 'block';
          alertBox.innerHTML = `<i class="fas fa-times-circle me-2"></i>${res.message}`;
        }
      });
    });
  </script>
</body>

</html>
