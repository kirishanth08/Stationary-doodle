<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register a new administrator account for Doodle Desk.">
  <title>Admin Sign Up | Doodle Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="../assets/css/dark-mode.css" rel="stylesheet">
  <link href="../assets/css/rtl.css" rel="stylesheet">
  <link href="../assets/css/doodle-desk.css" rel="stylesheet">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ========== MINIMAL AUTH HEADER (no full navbar) ========== -->
  <header class="auth-minimal-header py-3">
    <div class="container">
      <a class="navbar-brand d-inline-flex align-items-center gap-2 text-decoration-none" href="index.html">
        <img src="../assets/images/logo-mark.svg" alt="" class="brand-mark" aria-hidden="true" width="36" height="36">
        <span class="brand-text">Doodle <span class="brand-accent">Desk</span></span>
      </a>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main id="main-content">
    <section class="auth-page-wrap section-padding reveal-on-scroll">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card card-stationery p-4 shadow-sm border-0 rounded-4">
              <div class="text-center mb-4">
                <h2 class="h4 fw-bold mb-1">Create Admin Account</h2>
                <p class="text-muted small">Access dashboard stats and manage inventory.</p>
              </div>

              <!-- Alert messages -->
              <div id="adminSignupAlert" class="mb-3" style="display:none;"></div>

              <form id="adminSignupForm" class="form-stationery needs-validation" novalidate>
                <div class="mb-3">
                  <label for="adminSignupName" class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="adminSignupName" required placeholder="Jane Smith">
                  <div class="invalid-feedback">Please enter your name.</div>
                </div>

                <div class="mb-3">
                  <label for="adminSignupEmail" class="form-label">Admin Email</label>
                  <input type="email" class="form-control" id="adminSignupEmail" required placeholder="admin@doodledesk.com">
                  <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-3">
                  <label for="adminSignupPassword" class="form-label">Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control" id="adminSignupPassword" required minlength="6" placeholder="Min 6 characters">
                    <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn1" aria-label="Toggle password visibility">
                      <i class="far fa-eye" aria-hidden="true"></i>
                    </button>
                    <div class="invalid-feedback">Password must be at least 6 characters.</div>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="adminSignupConfirm" class="form-label">Confirm Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control" id="adminSignupConfirm" required placeholder="Re-enter password">
                    <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn2" aria-label="Toggle password visibility">
                      <i class="far fa-eye" aria-hidden="true"></i>
                    </button>
                    <div class="invalid-feedback">Passwords must match.</div>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 rounded-3 mb-3"><i class="fas fa-user-shield me-2"></i>Register Admin</button>

                <div class="auth-divider my-3">or continue with</div>

                <div class="d-flex gap-2 mb-3">
                  <button type="button" class="btn-social w-50"><i class="fab fa-google" aria-hidden="true"></i> Google</button>
                  <button type="button" class="btn-social w-50"><i class="fab fa-apple" aria-hidden="true"></i> Apple</button>
                </div>

                <div class="text-center mt-2">
                  <p class="small text-muted mb-0">Already registered? <a href="admin-login.html" class="text-decoration-none text-primary-custom fw-bold">Sign In</a></p>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/navbar.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (window.DoodleAdmin.getCurrentAdmin()) {
        window.location.href = 'admin-dashboard.html';
      }

      // Setup validations
      window.DoodleValidation.setupRealTimeValidation('#adminSignupForm', {
        adminSignupName: { required: true },
        adminSignupEmail: { required: true, email: true },
        adminSignupPassword: { required: true, minlength: 6 },
        adminSignupConfirm: { required: true, matchesField: 'adminSignupPassword' }
      });

      // Show/Hide password toggles
      const bindToggle = (btnId, inputId) => {
        const btn = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        if (btn && input) {
          btn.addEventListener('click', () => {
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.querySelector('i').classList.toggle('fa-eye');
            btn.querySelector('i').classList.toggle('fa-eye-slash');
          });
        }
      };
      bindToggle('togglePasswordBtn1', 'adminSignupPassword');
      bindToggle('togglePasswordBtn2', 'adminSignupConfirm');

      // Submit Form
      const form = document.getElementById('adminSignupForm');
      const alertBox = document.getElementById('adminSignupAlert');
      
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!form.checkValidity()) return;

        const name = document.getElementById('adminSignupName').value;
        const email = document.getElementById('adminSignupEmail').value;
        const pass = document.getElementById('adminSignupPassword').value;

        const res = window.DoodleAdmin.register(name, email, pass);

        if (res.success) {
          alertBox.className = 'alert alert-success';
          alertBox.style.display = 'block';
          alertBox.innerHTML = `<i class="fas fa-check-circle me-2"></i>${res.message}`;
          form.reset();
          form.classList.remove('was-validated');
          
          setTimeout(() => {
            window.location.href = 'admin-login.html';
          }, 1500);
        } else {
          alertBox.className = 'alert alert-danger';
          alertBox.style.display = 'block';
          alertBox.innerHTML = `<i class="fas fa-times-circle me-2"></i>${res.message}`;
        }
      });
    });
  </script>
</body>
</html>
